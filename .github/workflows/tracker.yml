name: Price Drop Tracker

on:
  schedule:
    # Runs at exactly 00:00 and 12:00 UTC daily
    - cron: '0 */12 * * *'
  workflow_dispatch: # Allows you to manually click a button on GitHub to test it instantly

permissions:
  contents: write # Crucial: Allows GitHub to save the updated 'last_price.txt' back to your repo

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      # Auto-commits the updated price file so the system remembers the baseline next time
      - name: Commit and push price update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add last_price.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update last tracked price" && git push)
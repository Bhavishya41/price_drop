name: Price Drop Tracker

on:
  schedule:
    # Runs at exactly 00:00 and 12:00 UTC daily
    - cron: '0 */12 * * *'
  workflow_dispatch: # Allows you to manually click a button on GitHub to test it instantly

permissions:
  contents: write # Crucial: Allows GitHub to save the updated 'last_price.txt' back to your repo

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    # ... (Keep the top triggers and configuration fields exactly the same)

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      # Step 1: Run your keyboard script
      - name: Run Keyboard Tracker
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      # Step 2: Run your brand new mouse script
      - name: Run Mouse Tracker
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python mouse.py

      # Step 3: Track and save changes for BOTH history text files back to master
      - name: Commit and push price updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add last_price.txt last_price_mouse.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update tracker price profiles" && git push origin master)
